server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA fallback ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: User Service (8081) ────────────────────
    location /api/user/ {
        proxy_pass         http://user-service:8081/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # ── Proxy: Movie Service (8082) ───────────────────
    location /api/movie/ {
        proxy_pass         http://movie-service:8082/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # ── Proxy: Booking Service (8083) ─────────────────
    location /api/booking/ {
        proxy_pass         http://booking-service:8083/;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }

    # ── Proxy: Payment+Notification Service (8084) ────
    # SSE requires special settings: no buffering, long timeout
    location /api/payment/ {
        proxy_pass             http://payment-notification:8084/;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       Connection        '';
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        add_header             X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }
}
